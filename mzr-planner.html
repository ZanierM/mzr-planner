const {useState,useEffect,useRef,useCallback}=React;

// ── Helpers ──────────────────────────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// Simple hash for password (not cryptographic, but fine for this use case)
async function hashPassword(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── School weeks Sep 2026 – Jul 2027 ────────────────────────────────────────
function getSchoolWeeks(){
  const weeks=[];
  let d=new Date(2026,8,1);
  while(d.getDay()!==1)d.setDate(d.getDate()+1);
  const end=new Date(2027,6,25);
  let n=1;
  while(d<=end){
    const mon=new Date(d),fri=new Date(d);fri.setDate(fri.getDate()+4);
    const fmt=dt=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    weeks.push({id:n,label:`Week ${n}: ${fmt(mon)} – ${fmt(fri)}`,monday:new Date(mon)});
    d.setDate(d.getDate()+7);n++;
  }
  return weeks;
}
const WEEKS=getSchoolWeeks();
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DSHORT=['Mon','Tue','Wed','Thu','Fri'];
const PERIODS=['P1','P2','P3','P4','P5'];
const CATS={teaching:'📚',pastoral:'🧑‍🤝‍🧑',admin:'📋',marking:'✏️',meeting:'🗓',personal:'⭐'};
const PRI={high:{l:'High',c:'#ef4444',bg:'#fef2f2',bgd:'#3f1212'},medium:{l:'Med',c:'#f59e0b',bg:'#fffbeb',bgd:'#3b2700'},low:{l:'Low',c:'#22c55e',bg:'#f0fdf4',bgd:'#052e16'}};
const RAG={red:{l:'Red',c:'#ef4444',bg:'#fef2f2',bgd:'#3f1212'},amber:{l:'Amber',c:'#f59e0b',bg:'#fffbeb',bgd:'#3b2700'},green:{l:'Green',c:'#22c55e',bg:'#f0fdf4',bgd:'#052e16'}};

  {id:'stats',label:'📊 Stats'},

];

function getDateForDay(monday,i){const d=new Date(monday);d.setDate(d.getDate()+i);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function getTodayInfo(){
  const t=new Date();t.setHours(0,0,0,0);
  for(const w of WEEKS){
    const m=new Date(w.monday);m.setHours(0,0,0,0);
    const f=new Date(m);f.setDate(f.getDate()+4);
    if(t>=m&&t<=f)return{weekId:w.id,dayIdx:Math.min(Math.max(t.getDay()-1,0),4)};
  }
  return{weekId:1,dayIdx:0};
}

// ── GitHub Gist Sync ─────────────────────────────────────────────────────────
async function gistLoad(token,gistId){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers:{Authorization:`token ${token}`,'Accept':'application/vnd.github.v3+json'}});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.slice(0,120)}`)}
  const data=await r.json();
  const content=data.files['mzr-planner-data.json']?.content;
  return content?JSON.parse(content):null;
}
async function gistSave(token,gistId,payload){
  const r=await fetch(`https://api.github.com/gists/${gistId}`,{
    method:'PATCH',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({files:{'mzr-planner-data.json':{content:JSON.stringify(payload,null,2)}}})
  });
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.slice(0,120)}`)}
}
async function gistCreate(token){
  const r=await fetch('https://api.github.com/gists',{
    method:'POST',
    headers:{Authorization:`token ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify({description:'MZR Planner Data',public:false,files:{'mzr-planner-data.json':{content:JSON.stringify({},null,2)}}})
  });
  if(!r.ok)throw new Error('Failed to create Gist');
  const data=await r.json();
  return data.id;
}

// ── Password Screen ───────────────────────────────────────────────────────────
function PasswordScreen({onUnlock,dark}){
  const C=dark?{bg:'#0d1117',surface:'#161b22',border:'#30363d',text:'#e6edf3',muted:'#8b949e',accent:'#818cf8'}
              :{bg:'#f0f2f5',surface:'#ffffff',border:'#e2e8f0',text:'#0f172a',muted:'#64748b',accent:'#4f46e5'};
  const [mode,setMode]=useState(()=>load('mzr_pwhash',null)?'login':'setup');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  async function handleSetup(){
    if(pw.length<4){setErr('Password must be at least 4 characters');return}
    if(pw!==pw2){setErr('Passwords do not match');return}
    setLoading(true);
    const h=await hashPassword(pw);
    save('mzr_pwhash',h);
    setLoading(false);
    onUnlock();
  }
  async function handleLogin(){
    setLoading(true);
    const h=await hashPassword(pw);
    const stored=load('mzr_pwhash',null);
    if(h===stored){onUnlock()}
    else{setErr('Incorrect password');setPw('')}
    setLoading(false);
  }

  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:36,width:'100%',maxWidth:380,boxShadow:'0 8px 32px rgba(0,0,0,0.12)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:36,marginBottom:8}}>🎓</div>
          <div style={{fontSize:20,fontWeight:800,color:C.accent,letterSpacing:'-0.3px'}}>MZR Planner</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>{mode==='setup'?'Create your password to get started':'Enter your password to continue'}</div>
        </div>
        {mode==='setup'&&<div style={{fontSize:12,color:C.muted,background:C.bg,borderRadius:8,padding:'10px 12px',marginBottom:16,lineHeight:1.6}}>
          First time setup — choose a password. You'll need this every time you open the planner.
        </div>}
        <input
          type="password" placeholder="Password" value={pw}
          onChange={e=>{setPw(e.target.value);setErr('')}}
          onKeyDown={e=>e.key==='Enter'&&(mode==='setup'?pw2?handleSetup():document.getElementById('pw2')?.focus():handleLogin())}
          style={{width:'100%',background:C.bg,border:`1px solid ${err?'#ef4444':C.border}`,color:C.text,borderRadius:8,padding:'10px 12px',outline:'none',marginBottom:10,boxSizing:'border-box'}}
          autoFocus
        />
        {mode==='setup'&&<input
          id="pw2" type="password" placeholder="Confirm password" value={pw2}
          onChange={e=>{setPw2(e.target.value);setErr('')}}
          onKeyDown={e=>e.key==='Enter'&&handleSetup()}
          style={{width:'100%',background:C.bg,border:`1px solid ${err?'#ef4444':C.border}`,color:C.text,borderRadius:8,padding:'10px 12px',outline:'none',marginBottom:10,boxSizing:'border-box'}}
        />}
        {err&&<div style={{color:'#ef4444',fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={mode==='setup'?handleSetup:handleLogin} disabled={loading}
          style={{width:'100%',background:C.accent,color:'#fff',border:'none',borderRadius:8,padding:'11px',fontWeight:700,fontSize:14,cursor:'pointer'}}>
          {loading?'…':mode==='setup'?'Set password & open planner':'Unlock'}
        </button>
        {mode==='login'&&<button onClick={()=>{if(confirm('This will clear your saved password. Continue?')){localStorage.removeItem('mzr_pwhash');setMode('setup');setPw('');setErr('')}}}
          style={{width:'100%',background:'none',border:'none',color:C.muted,fontSize:11,cursor:'pointer',marginTop:12,padding:4}}>
          Forgot password / reset
        </button>}
      </div>
    </div>
  );
}

// ── Gist Setup Screen ─────────────────────────────────────────────────────────
function GistSetup({onDone,onSkip,dark}){
  const C=dark?{bg:'#0d1117',surface:'#161b22',border:'#30363d',text:'#e6edf3',muted:'#8b949e',accent:'#818cf8',accentBg:'#1e2044'}
              :{bg:'#f0f2f5',surface:'#ffffff',border:'#e2e8f0',text:'#0f172a',muted:'#64748b',accent:'#4f46e5',accentBg:'#eef2ff'};
  const [token,setToken]=useState('');
  const [status,setStatus]=useState('');
  const [loading,setLoading]=useState(false);

  async function connect(){
    if(!token.trim()){setStatus('❌ Please enter a token');return}
    setLoading(true);setStatus('Connecting…');
    try{
      // First: look for an existing MZR Planner Gist
      const listR=await fetch('https://api.github.com/gists',{headers:{Authorization:`token ${token.trim()}`,'Accept':'application/vnd.github.v3+json'}});
      if(!listR.ok)throw new Error(`Token error: ${listR.status}`);
      const gists=await listR.json();
      let gistId=null;
      // Find existing MZR Planner Gist
      const existing=gists.find(g=>g.description==='MZR Planner Data'&&g.files['mzr-planner-data.json']);
      if(existing){
        gistId=existing.id;
        setStatus('✅ Found existing Gist — connected!');
      } else {
        // Create new one only if none exists
        gistId=await gistCreate(token.trim());
        setStatus('✅ New Gist created — connected!');
      }
      save('mzr_gist_token',token.trim());
      save('mzr_gist_id',gistId);
      setTimeout(()=>onDone(token.trim(),gistId),800);
    }catch(e){setStatus('❌ Failed: '+e.message)}
    setLoading(false);
  }

  const inp={width:'100%',background:C.bg,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:'9px 12px',outline:'none',boxSizing:'border-box',marginBottom:10};
  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:32,width:'100%',maxWidth:480,boxShadow:'0 8px 32px rgba(0,0,0,0.12)'}}>
        <div style={{fontSize:18,fontWeight:800,color:C.accent,marginBottom:4}}>☁️ Enable sync across devices</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.7}}>
          Paste your GitHub token — the planner will automatically find your existing data Gist, or create a new one if this is your first time.
        </div>
        <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:14,marginBottom:16,fontSize:12,lineHeight:1.8,color:C.text}}>
          <strong>How to get a token (2 minutes):</strong><br/>
          1. Go to <strong>github.com → Settings → Developer settings</strong><br/>
          2. Click <strong>Personal access tokens → Tokens (classic) → Generate new token</strong><br/>
          3. Give it a name (e.g. "MZR Planner"), tick <strong>gist</strong> scope only<br/>
          4. Click Generate and paste the token below
        </div>
        <input type="password" placeholder="Paste your GitHub token here" value={token}
          onChange={e=>setToken(e.target.value)} onKeyDown={e=>e.key==='Enter'&&connect()} style={inp}/>
        {status&&<div style={{fontSize:12,fontWeight:600,color:status.startsWith('✅')?'#22c55e':status.startsWith('❌')?'#ef4444':C.muted,marginBottom:10}}>{status}</div>}
        <button onClick={connect} disabled={loading}
          style={{width:'100%',background:C.accent,color:'#fff',border:'none',borderRadius:8,padding:'10px',fontWeight:700,cursor:'pointer',marginBottom:8}}>
          {loading?'Connecting…':'Connect & enable sync'}
        </button>
        <button onClick={onSkip}
          style={{width:'100%',background:'none',border:`1px solid ${C.border}`,color:C.muted,borderRadius:8,padding:'9px',cursor:'pointer',fontSize:12}}>
          Skip for now — use local storage only
        </button>
      </div>
    </div>
  );
}

// ── Main Planner ──────────────────────────────────────────────────────────────
function Planner(){
  const todayInfo=getTodayInfo();
  const [dark,setDark]=useState(()=>load('tp_dark',false));
  const [selWeek,setSelWeek]=useState(()=>load('tp_week',todayInfo.weekId));
  const [focusMode,setFocusMode]=useState(false);
  const [visibleSecs,setVisibleSecs]=useState(()=>{
    const saved=load('tp_visible',null),allIds=ALL_SECS.map(s=>s.id);
    if(!saved)return allIds.filter(id=>id!=='reflect');
    return[...new Set([...saved.filter(id=>allIds.includes(id)),...allIds.filter(id=>!saved.includes(id)&&id!=='reflect')])];
  });
  const [secOrder,setSecOrder]=useState(()=>{
    const saved=load('tp_order',null),allIds=ALL_SECS.map(s=>s.id);
    if(!saved)return allIds;
    return[...new Set([...saved.filter(id=>allIds.includes(id)),...allIds.filter(id=>!saved.includes(id))])];
  });
  const [showManage,setShowManage]=useState(false);
  const dragSrc=useRef(null);

  // data
  const [todos,setTodos]=useState(()=>{const v=load('tp_todos',[]);return Array.isArray(v)?v:[]});
  const [homework,setHomework]=useState(()=>{const v=load('tp_hw',[]);return Array.isArray(v)?v:[]});
  const [tt,setTT]=useState(()=>load('tp_tt',{}));
  const [notes,setNotes]=useState(()=>load('tp_notes',{}));
  const [reflect,setReflect]=useState(()=>load('tp_reflect',{}));
  const [contacts,setContacts]=useState(()=>load('tp_contacts',{}));
  const [concerns,setConcerns]=useState(()=>load('tp_concerns',{}));
  const [cover,setCover]=useState(()=>load('tp_cover',{}));
  const [keyDates,setKeyDates]=useState(()=>load('tp_keydates',[]));
  const [presetTT,setPresetTT]=useState(()=>load('tp_preset_tt',{}));

  // gist
  const [gistToken,setGistToken]=useState(()=>load('mzr_gist_token',''));
  const [gistId,setGistId]=useState(()=>load('mzr_gist_id',''));
  const [syncStatus,setSyncStatus]=useState('');
  const [showSync,setShowSync]=useState(false);

  // ui
  const [editTT,setEditTT]=useState(false);
  const [activeTTCell,setActiveTTCell]=useState(null);
  const [showTTImport,setShowTTImport]=useState(false);
  const [ttImportMsg,setTTImportMsg]=useState('');
  const [showCalImport,setShowCalImport]=useState(false);
  const [calImporting,setCalImporting]=useState(false);
  const [calPreview,setCalPreview]=useState(null);
  const [calMsg,setCalMsg]=useState('');
  const [showAddTask,setShowAddTask]=useState(false);
  const [showCompleted,setShowCompleted]=useState(false);
  const [newTask,setNewTask]=useState({text:'',priority:'medium',category:'teaching',dueDay:-1});
  const [filterCat,setFilterCat]=useState('all');
  const [showAddContact,setShowAddContact]=useState(false);
  const [newContact,setNewContact]=useState({student:'',method:'Call',outcome:'',followUp:''});
  const [showAddConcern,setShowAddConcern]=useState(false);
  const [newConcern,setNewConcern]=useState({student:'',concern:'',action:'',rag:'amber',followUp:''});
  const [showAddHW,setShowAddHW]=useState(false);
  const [newHW,setNewHW]=useState({classGroup:'',task:'',set:'',due:''});
  const [showAddCover,setShowAddCover]=useState(false);
  const [newCover,setNewCover]=useState({classGroup:'',day:0,work:''});
  const [showAddDate,setShowAddDate]=useState(false);
  const [newDate,setNewDate]=useState({label:'',date:'',category:'general'});
  const fileRef=useRef(),calRef=useRef();

  const wk=`w${selWeek}`;
  const weekObj=WEEKS.find(w=>w.id===selWeek)||WEEKS[0];
  const isThisWeek=selWeek===todayInfo.weekId;
  const weekTT=tt[wk]||{};
  const weekNotes=notes[wk]||'';
  const weekReflect=reflect[wk]||{wentWell:'',followUp:'',rating:0};
  const weekContacts=contacts[wk]||[];
  const weekConcerns=concerns[wk]||[];
  const weekCover=cover[wk]||[];

  function getTTVal(di,p){const k=`${di}_${p}`;return weekTT[k]!==undefined?weekTT[k]:presetTT[k]||''}

  // persist
  useEffect(()=>save('tp_dark',dark),[dark]);
  useEffect(()=>save('tp_week',selWeek),[selWeek]);
  useEffect(()=>save('tp_todos',todos),[todos]);
  useEffect(()=>save('tp_hw',homework),[homework]);
  useEffect(()=>save('tp_tt',tt),[tt]);
  useEffect(()=>save('tp_notes',notes),[notes]);
  useEffect(()=>save('tp_reflect',reflect),[reflect]);
  useEffect(()=>save('tp_contacts',contacts),[contacts]);
  useEffect(()=>save('tp_concerns',concerns),[concerns]);
  useEffect(()=>save('tp_cover',cover),[cover]);
  useEffect(()=>save('tp_keydates',keyDates),[keyDates]);
  useEffect(()=>save('tp_preset_tt',presetTT),[presetTT]);
  useEffect(()=>save('tp_visible',visibleSecs),[visibleSecs]);
  useEffect(()=>save('tp_order',secOrder),[secOrder]);

  // ── Gist sync — explicit only, no auto-save (avoids stale closure bugs) ──
  const latestToken=useRef(gistToken);
  const latestGistId=useRef(gistId);
  useEffect(()=>{latestToken.current=gistToken},[gistToken]);
  useEffect(()=>{latestGistId.current=gistId},[gistId]);

  function buildPayload(){
    return{todos,homework,tt,notes,reflect,contacts,concerns,cover,keyDates,presetTT,visibleSecs,secOrder,dark};
  }

  async function syncNow(){
    const tok=latestToken.current,gid=latestGistId.current;
    if(!tok||!gid){setShowSync(true);return}
    setSyncStatus('⏳ Saving…');
    try{
      await gistSave(tok,gid,buildPayload());
      setSyncStatus('✅ Saved to cloud');
    }catch(e){setSyncStatus('❌ Save failed: '+e.message)}
    setTimeout(()=>setSyncStatus(''),6000);
  }

  async function loadFromGist(){
    const tok=latestToken.current,gid=latestGistId.current;
    if(!tok||!gid){setSyncStatus('⚠️ No sync configured');return}
    setSyncStatus('⏳ Loading…');
    try{
      const data=await gistLoad(tok,gid);
      if(data){
        if(Array.isArray(data.todos))setTodos(data.todos);
        if(Array.isArray(data.homework))setHomework(data.homework);
        if(data.tt&&typeof data.tt==='object')setTT(data.tt);
        if(data.notes&&typeof data.notes==='object')setNotes(data.notes);
        if(data.reflect&&typeof data.reflect==='object')setReflect(data.reflect);
        if(data.contacts&&typeof data.contacts==='object')setContacts(data.contacts);
        if(data.concerns&&typeof data.concerns==='object')setConcerns(data.concerns);
        if(data.cover&&typeof data.cover==='object')setCover(data.cover);
        if(Array.isArray(data.keyDates))setKeyDates(data.keyDates);
        if(data.presetTT&&typeof data.presetTT==='object')setPresetTT(data.presetTT);
        setSyncStatus('✅ Loaded from cloud');
      }else{setSyncStatus('ℹ️ Nothing saved yet — add data and click ☁️')}
    }catch(e){setSyncStatus('❌ Load failed: '+e.message)}
    setTimeout(()=>setSyncStatus(''),6000);
  }


  // ── Data mutations ──
  function addTask(){if(!newTask.text.trim())return;setTodos(p=>[...p,{id:uid(),...newTask,text:newTask.text.trim(),done:false,createdWeek:selWeek}]);setNewTask({text:'',priority:'medium',category:'teaching',dueDay:-1});setShowAddTask(false)}
  function toggleTask(id){setTodos(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))}
  function deleteTask(id){setTodos(p=>p.filter(t=>t.id!==id))}
  function saveTTCell(di,period,val){setTT(p=>({...p,[wk]:{...(p[wk]||{}),[`${di}_${period}`]:val}}))}
  function addContact(){if(!newContact.student.trim())return;setContacts(p=>({...p,[wk]:[...(p[wk]||[]),{id:uid(),date:new Date().toLocaleDateString('en-GB'),...newContact}]}));setNewContact({student:'',method:'Call',outcome:'',followUp:''});setShowAddContact(false)}
  function deleteContact(id){setContacts(p=>({...p,[wk]:(p[wk]||[]).filter(c=>c.id!==id)}))}
  function addConcern(){if(!newConcern.student.trim())return;setConcerns(p=>({...p,[wk]:[...(p[wk]||[]),{id:uid(),...newConcern}]}));setNewConcern({student:'',concern:'',action:'',rag:'amber',followUp:''});setShowAddConcern(false)}
  function updateConcernRag(id,rag){setConcerns(p=>({...p,[wk]:(p[wk]||[]).map(c=>c.id===id?{...c,rag}:c)}))}
  function deleteConcern(id){setConcerns(p=>({...p,[wk]:(p[wk]||[]).filter(c=>c.id!==id)}))}
  function addHW(){if(!newHW.classGroup.trim())return;setHomework(p=>[...p,{id:uid(),...newHW,returned:false,createdWeek:selWeek}]);setNewHW({classGroup:'',task:'',set:'',due:''});setShowAddHW(false)}
  function toggleHW(id){setHomework(p=>p.map(h=>h.id===id?{...h,returned:!h.returned}:h))}
  function deleteHW(id){setHomework(p=>p.filter(h=>h.id!==id))}
  function addCover(){if(!newCover.classGroup.trim())return;setCover(p=>({...p,[wk]:[...(p[wk]||[]),{id:uid(),...newCover}]}));setNewCover({classGroup:'',day:0,work:''});setShowAddCover(false)}
  function deleteCover(id){setCover(p=>({...p,[wk]:(p[wk]||[]).filter(c=>c.id!==id)}))}
  function addKeyDate(){if(!newDate.label.trim()||!newDate.date)return;setKeyDates(p=>[...p,{id:uid(),...newDate}].sort((a,b)=>a.date.localeCompare(b.date)));setNewDate({label:'',date:'',category:'general'});setShowAddDate(false)}
  function deleteKeyDate(id){setKeyDates(p=>p.filter(d=>d.id!==id))}
  function updateReflect(f,v){setReflect(p=>({...p,[wk]:{...(p[wk]||{wentWell:'',followUp:'',rating:0}),[f]:v}}))}
  function toggleSec(id){setVisibleSecs(p=>p.includes(id)?p.filter(s=>s!==id):[...p,id])}
  const vis=id=>visibleSecs.includes(id);

  // drag
  function onDragStart(e,id){dragSrc.current=id;e.dataTransfer.effectAllowed='move'}
  function onDragOver(e,id){e.preventDefault();e.currentTarget.classList.add('drag-over')}
  function onDragLeave(e){e.currentTarget.classList.remove('drag-over')}
  function onDrop(e,id){
    e.preventDefault();e.currentTarget.classList.remove('drag-over');
    const src=dragSrc.current;if(!src||src===id)return;
    setSecOrder(prev=>{const a=[...prev],from=a.indexOf(src),to=a.indexOf(id);if(from===-1||to===-1)return prev;a.splice(from,1);a.splice(to,0,src);return a});
    dragSrc.current=null;
  }
  function onDragEnd(e){e.currentTarget.classList.remove('drag-over');dragSrc.current=null}

  const orderedSecs=[...new Set([...secOrder.filter(id=>ALL_SECS.find(s=>s.id===id)),...ALL_SECS.map(s=>s.id).filter(id=>!secOrder.includes(id))])];

  // Excel timetable import
  function handleXLSX(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        const dayA={mon:0,monday:0,tue:1,tuesday:1,wed:2,wednesday:2,thu:3,thursday:3,fri:4,friday:4};
        const perA={p1:0,'period 1':0,'1':0,p2:1,'period 2':1,'2':1,p3:2,'period 3':2,'3':2,p4:3,'period 4':3,'4':3,p5:4,'period 5':4,'5':4};
        let hRow=-1,dcm={};
        for(let r=0;r<Math.min(rows.length,5);r++){
          const row=rows[r];let found=0;
          for(let c=0;c<row.length;c++){const cell=String(row[c]||'').trim().toLowerCase();if(dayA[cell]!==undefined){dcm[dayA[cell]]=c;found++}}
          if(found>=3){hRow=r;break}
        }
        if(hRow===-1){dcm={0:1,1:2,2:3,3:4,4:5};hRow=0}
        const result={};
        for(let r=hRow+1;r<rows.length;r++){
          const row=rows[r];const pc=String(row[0]||'').trim().toLowerCase();const pIdx=perA[pc];
          if(pIdx===undefined)continue;
          for(const[di,col]of Object.entries(dcm)){const val=String(row[col]||'').trim();if(val&&val!=='undefined')result[`${di}_P${pIdx+1}`]=val}
        }
        if(!Object.keys(result).length){setTTImportMsg('⚠️ Could not read timetable. Check format.')}
        else{setPresetTT(result);setTTImportMsg(`✅ Imported ${Object.keys(result).length} classes`)}
      }catch(err){setTTImportMsg('❌ Error: '+err.message)}
    };
    reader.readAsBinaryString(file);e.target.value='';
  }

  // Calendar Word import
  async function handleCalendar(e){
    const file=e.target.files[0];if(!file)return;
    e.target.value='';setCalImporting(true);setCalMsg('');setCalPreview(null);
    try{
      const ab=await file.arrayBuffer();
      const result=await mammoth.extractRawText({arrayBuffer:ab});
      const text=result.value;
      if(!text||text.trim().length<20){setCalMsg('⚠️ Could not extract text.');setCalImporting(false);return}
      const sys=`You are a school calendar parser. Extract every event/date from the text.
Return ONLY a JSON array, no preamble, no markdown fences.
Each item: {"label":"event name","date":"YYYY-MM-DD","category": one of [general,exam,report,parents evening,INSET,assembly,trip,deadline]}
Rules: School year Sep 2026–Jul 2027. Sep-Dec=2026, Jan-Jul=2027. Match categories by keyword. Return [] if nothing found.`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:[{role:'user',content:text.slice(0,8000)}]})});
      const data=await resp.json();
      const raw=data.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(!Array.isArray(parsed)||!parsed.length){setCalMsg('⚠️ No dates found.');setCalImporting(false);return}
      setCalPreview(parsed.map(item=>({...item,id:uid(),keep:true})));
      setCalMsg(`✅ Found ${parsed.length} events in "${file.name}"`);
    }catch(err){setCalMsg('❌ Error: '+err.message)}
    setCalImporting(false);
  }
  function togglePreview(id){setCalPreview(p=>p.map(i=>i.id===id?{...i,keep:!i.keep}:i))}
  function confirmCalImport(){
    const toAdd=calPreview.filter(i=>i.keep);
    setKeyDates(prev=>[...prev.filter(d=>d.source!=='imported'),...toAdd.map(i=>({id:uid(),label:i.label,date:i.date,category:i.category,source:'imported'}))].sort((a,b)=>a.date.localeCompare(b.date)));
    setCalPreview(null);setCalMsg(`✓ ${toAdd.length} events imported`);setShowCalImport(false);
  }

  // derived
  const filteredTasks=todos.filter(t=>filterCat==='all'||t.category===filterCat).sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;return({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1)});
  const pendingTasks=filteredTasks.filter(t=>!t.done);
  const doneTasks=filteredTasks.filter(t=>t.done);
  const donePct=todos.length?Math.round(todos.filter(t=>t.done).length/todos.length*100):0;
  const todayStr=new Date().toISOString().slice(0,10);
  const in14=new Date();in14.setDate(in14.getDate()+14);
  const upcomingDates=keyDates.filter(d=>d.date>=todayStr&&d.date<=in14.toISOString().slice(0,10));
  const focusTasks=todos.filter(t=>!t.done&&(t.dueDay===todayInfo.dayIdx||t.dueDay===-1));

  // ── Theme ──
  const C=dark?{bg:'#0d1117',surface:'#161b22',surface2:'#1c2230',border:'#30363d',text:'#e6edf3',muted:'#8b949e',accent:'#818cf8',accentBg:'#1e2044',inputBg:'#0d1117',todayBg:'#0d2818',todayBorder:'#22c55e'}
              :{bg:'#f0f2f5',surface:'#ffffff',surface2:'#f8fafc',border:'#e2e8f0',text:'#0f172a',muted:'#64748b',accent:'#4f46e5',accentBg:'#eef2ff',inputBg:'#f8fafc',todayBg:'#f0fdf4',todayBorder:'#16a34a'};
  const card={background:C.surface,border:`1px solid ${C.border}`,borderRadius:12};
  const lbl={fontSize:10,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',color:C.muted,marginBottom:8,display:'block'};
  const inp={background:C.inputBg,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:'7px 10px',fontSize:13,outline:'none',width:'100%',boxSizing:'border-box'};
  const sel={background:C.inputBg,border:`1px solid ${C.border}`,color:C.text,borderRadius:8,padding:'6px 9px',fontSize:12,outline:'none',cursor:'pointer'};
  const btnP={background:C.accent,color:'#fff',border:'none',borderRadius:8,padding:'7px 13px',cursor:'pointer',fontSize:12,fontWeight:600,whiteSpace:'nowrap'};
  const btnG={background:'transparent',color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:12,whiteSpace:'nowrap'};
  const btnSm={background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:12,padding:'2px 5px',lineHeight:1};

  function PBadge({p}){const i=PRI[p];return <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,background:dark?i.bgd:i.bg,color:i.c,border:`1px solid ${i.c}44`}}>{i.l}</span>}

  function TaskRow({t}){
    const isDueToday=isThisWeek&&t.dueDay===todayInfo.dayIdx;
    const carried=t.createdWeek&&t.createdWeek!==selWeek;
    return(
      <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'8px',borderRadius:8,marginBottom:2,background:isDueToday&&!t.done?C.todayBg:'transparent',borderLeft:isDueToday&&!t.done?`3px solid ${C.todayBorder}`:'3px solid transparent'}}>
        <button onClick={()=>toggleTask(t.id)} style={{flexShrink:0,marginTop:1,width:17,height:17,borderRadius:4,border:`2px solid ${t.done?C.accent:C.border}`,background:t.done?C.accent:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          {t.done&&<span style={{color:'#fff',fontSize:10,fontWeight:800}}>✓</span>}
        </button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:500,fontSize:13,marginBottom:3}}>{t.text}</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
            <PBadge p={t.priority}/>
            <span style={{fontSize:10,color:C.muted}}>{CATS[t.category]} {t.category}</span>
            {t.dueDay>=0&&<span style={{fontSize:10,color:isDueToday?C.todayBorder:C.muted}}>📅 {DSHORT[t.dueDay]}</span>}
            {carried&&!t.done&&<span style={{fontSize:10,color:'#f59e0b',background:dark?'#3b2700':'#fffbeb',padding:'1px 6px',borderRadius:20,border:'1px solid #f59e0b44'}}>carried</span>}
          </div>
        </div>
        <button onClick={()=>deleteTask(t.id)} style={btnSm}>✕</button>
      </div>
    );
  }

  function Section({id,title,actions,children}){
    if(!vis(id))return null;
    return(
      <div draggable onDragStart={e=>onDragStart(e,id)} onDragOver={e=>onDragOver(e,id)} onDragLeave={onDragLeave} onDrop={e=>onDrop(e,id)} onDragEnd={onDragEnd}
        style={{...card,marginBottom:14,cursor:'default'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 16px',borderBottom:`1px solid ${C.border}`,background:C.surface2,borderRadius:'12px 12px 0 0'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{cursor:'grab',color:C.muted,fontSize:14,userSelect:'none'}} title="Drag to reorder">⠿</span>
            <span style={{fontWeight:700,fontSize:13}}>{title}</span>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {actions}
            <button onClick={()=>toggleSec(id)} style={{...btnSm,fontSize:14,opacity:0.5}} title="Hide">✕</button>
          </div>
        </div>
        <div style={{padding:16}}>{children}</div>
      </div>
    );
  }

  // TTCell
  function TTCell({di,period}){
    const key=`${di}_${period}`,val=getTTVal(di,period),isToday=isThisWeek&&di===todayInfo.dayIdx,isActive=activeTTCell===key;
    const presetOpts=[...new Set(Object.values(presetTT).filter(Boolean))];
    return(
      <div style={{position:'relative',borderRadius:7,border:`1px solid ${isToday?C.todayBorder+'55':C.border}`,background:val?(dark?'#6366f118':'#eef2ff'):(isToday?C.todayBg:C.inputBg),minHeight:38,display:'flex',alignItems:'center',justifyContent:'center',padding:'4px 6px',cursor:editTT?'text':'default'}}
        onClick={()=>editTT&&setActiveTTCell(isActive?null:key)}>
        {editTT&&isActive?(
          <div style={{position:'absolute',top:0,left:0,right:0,zIndex:50}}>
            <input autoFocus style={{...inp,borderRadius:'7px 7px 0 0',fontSize:11,textAlign:'center',fontWeight:600}}
              value={weekTT[key]!==undefined?weekTT[key]:val} placeholder="Class…"
              onChange={e=>saveTTCell(di,period,e.target.value)}
              onBlur={()=>setTimeout(()=>setActiveTTCell(null),150)}/>
            {presetOpts.length>0&&(
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:'0 0 7px 7px',maxHeight:140,overflowY:'auto',boxShadow:'0 4px 12px rgba(0,0,0,0.15)'}}>
                <div style={{padding:'4px 8px',fontSize:10,color:C.muted,fontWeight:700,borderBottom:`1px solid ${C.border}`}}>From timetable</div>
                {presetOpts.map(opt=>(
                  <div key={opt} onMouseDown={()=>{saveTTCell(di,period,opt);setActiveTTCell(null)}}
                    style={{padding:'6px 10px',fontSize:11,cursor:'pointer',color:C.text,fontWeight:500}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.accentBg}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{opt}</div>
                ))}
                <div onMouseDown={()=>{saveTTCell(di,period,'');setActiveTTCell(null)}}
                  style={{padding:'6px 10px',fontSize:11,cursor:'pointer',color:'#ef4444'}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.surface2}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>Clear</div>
              </div>
            )}
          </div>
        ):(
          <span style={{fontSize:11,fontWeight:val?600:400,color:val?C.accent:C.muted,opacity:val?1:0.35}}>{val||'—'}</span>
        )}
      </div>
    );
  }

  // Focus mode
  if(focusMode)return(
    <div style={{background:C.bg,color:C.text,minHeight:'100vh',fontFamily:'inherit'}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'10px 18px',display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontWeight:800,fontSize:15,color:C.accent}}>🎯 Focus Mode</span>
        <span style={{flex:1,color:C.muted,fontSize:12}}>{DAYS[todayInfo.dayIdx]} — {getDateForDay(weekObj.monday,todayInfo.dayIdx)}</span>
        <button style={btnG} onClick={()=>setFocusMode(false)}>✕ Exit</button>
      </div>
      <div style={{maxWidth:680,margin:'24px auto',padding:'0 16px'}}>
        <div style={{...card,padding:20,marginBottom:14}}>
          <span style={lbl}>Today's classes</span>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
            {PERIODS.map(p=>{const v=getTTVal(todayInfo.dayIdx,p);return(
              <div key={p} style={{textAlign:'center',background:v?C.accentBg:C.surface2,border:`1px solid ${v?C.accent:C.border}`,borderRadius:8,padding:'8px 4px'}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:2}}>{p}</div>
                <div style={{fontSize:12,fontWeight:700,color:v?C.accent:C.muted}}>{v||'—'}</div>
              </div>
            )})}
          </div>
        </div>
        <div style={{...card,padding:20}}>
          <span style={lbl}>Tasks for today ({focusTasks.length})</span>
          {focusTasks.length===0?<div style={{color:C.muted,fontSize:12,textAlign:'center',padding:'16px 0'}}>All clear ✨</div>
            :focusTasks.map(t=><TaskRow key={t.id} t={t}/>)}
        </div>
      </div>
    </div>
  );

  // ── MAIN RENDER ──
  return(
    <div style={{background:C.bg,color:C.text,minHeight:'100vh',fontFamily:"'Inter',system-ui,sans-serif",fontSize:13,transition:'background 0.2s,color 0.2s'}}>

      {/* HEADER */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'10px 18px',display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:200,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',flexWrap:'wrap'}}>
        <span style={{fontWeight:800,fontSize:15,color:C.accent,whiteSpace:'nowrap'}}>🎓 MZR Planner</span>
        <select style={{...sel,flex:1,minWidth:180,fontSize:13}} value={selWeek} onChange={e=>setSelWeek(Number(e.target.value))}>
          {WEEKS.map(w=><option key={w.id} value={w.id}>{w.label}</option>)}
        </select>
        {isThisWeek&&<span style={{fontSize:11,fontWeight:600,color:'#22c55e',background:dark?'#052e16':'#f0fdf4',border:'1px solid #22c55e44',borderRadius:20,padding:'3px 9px',whiteSpace:'nowrap'}}>This week</span>}
        {upcomingDates.length>0&&<span style={{fontSize:11,fontWeight:600,color:'#f59e0b',background:dark?'#3b2700':'#fffbeb',border:'1px solid #f59e0b44',borderRadius:20,padding:'3px 9px',whiteSpace:'nowrap'}}>📌 {upcomingDates.length} upcoming</span>}
        {syncStatus&&<span style={{fontSize:11,color:syncStatus.includes('❌')?'#ef4444':syncStatus.includes('✅')?'#22c55e':'#f59e0b',whiteSpace:'nowrap',maxWidth:300,overflow:'hidden',textOverflow:'ellipsis'}}>{syncStatus}</span>}
        <button style={{...btnG,padding:'6px 10px'}} onClick={async()=>{
          const tok=latestToken.current,gid=latestGistId.current;
          if(!tok||!gid){setSyncStatus('❌ No token/gist stored');return}
          setSyncStatus('🔍 Checking…');
          try{
            const payload=buildPayload();
            const data=await gistLoad(tok,gid);
            const inGist=(data?.todos||[]).length;
            const local=payload.todos.length;
            setSyncStatus(`Local:${local} tasks | Gist:${inGist} tasks | ID:${gid.slice(0,8)}`);
          }catch(e){setSyncStatus('❌ Debug error: '+e.message)}
        }} title="Debug">🔍</button>
        <button style={{...btnG,padding:'6px 10px'}} onClick={loadFromGist} title="Load from cloud">⬇️</button>
        <button style={{...btnG,padding:'6px 10px'}} onClick={syncNow} title="Save to cloud">☁️</button>
        <button style={{...btnG,padding:'6px 10px'}} onClick={()=>setFocusMode(true)} title="Focus mode">🎯</button>
        <button style={{...btnG,padding:'6px 10px'}} onClick={()=>setShowManage(m=>!m)} title="Manage sections">⚙️</button>
        <button style={{...btnG,padding:'6px 10px',fontSize:15}} onClick={()=>setDark(d=>!d)}>{dark?'☀️':'🌙'}</button>
      </div>

      {/* KEY DATES BANNER */}
      {upcomingDates.length>0&&(
        <div style={{background:dark?'#3b2700':'#fffbeb',borderBottom:'1px solid #f59e0b44',padding:'7px 18px',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:10,fontWeight:700,color:'#f59e0b',textTransform:'uppercase',letterSpacing:'0.07em',whiteSpace:'nowrap'}}>📌 Coming up</span>
          {upcomingDates.map(d=>(
            <span key={d.id} style={{fontSize:11,background:dark?'#4a3200':'#fef3c7',border:'1px solid #f59e0b44',borderRadius:20,padding:'2px 10px',color:dark?'#fbbf24':'#92400e',whiteSpace:'nowrap'}}>
              {new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})} — {d.label}
            </span>
          ))}
        </div>
      )}

      {/* SECTION MANAGER */}
      {showManage&&(
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 18px',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:700,color:C.muted,marginRight:4}}>Sections:</span>
          {ALL_SECS.map(s=>(
            <button key={s.id} onClick={()=>toggleSec(s.id)} style={{...vis(s.id)?btnP:btnG,fontSize:11,padding:'5px 12px'}}>
              {vis(s.id)?'✓ ':''}{s.label}
            </button>
          ))}
          <button style={{...btnG,fontSize:11,marginLeft:8}} onClick={()=>setSecOrder(ALL_SECS.map(s=>s.id))}>↺ Reset order</button>
          {gistToken&&<button style={{...btnG,fontSize:11,color:'#ef4444',borderColor:'#ef444433'}} onClick={()=>{if(confirm('Disconnect Gist sync?')){save('mzr_gist_token','');save('mzr_gist_id','');setGistToken('');setGistId('')}}}>Disconnect sync</button>}
          {!gistToken&&<button style={{...btnG,fontSize:11,color:'#22c55e',borderColor:'#22c55e33'}} onClick={()=>setShowSync(true)}>+ Enable sync</button>}
          <button style={{...btnSm,marginLeft:'auto',fontSize:12}} onClick={()=>setShowManage(false)}>Done</button>
        </div>
      )}

      {/* GIST SETUP MODAL */}
      {showSync&&<GistSetup dark={dark}
        onDone={(tok,id)=>{setGistToken(tok);setGistId(id);setShowSync(false);setSyncStatus('✅ Sync enabled')}}
        onSkip={()=>setShowSync(false)}/>}

      <div style={{maxWidth:1280,margin:'0 auto',padding:'14px 14px 40px'}}>

        {/* PROGRESS */}
        <div style={{...card,padding:'12px 16px',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
            <span style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'0.07em'}}>Weekly Overview</span>
            <span style={{fontSize:12,fontWeight:700,color:C.accent}}>{donePct}% — {todos.filter(t=>t.done).length}/{todos.length} tasks done</span>
          </div>
          <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${donePct}%`,background:`linear-gradient(90deg,${C.accent},#a855f7)`,borderRadius:3,transition:'width 0.4s'}}/>
          </div>
          <div style={{display:'flex',gap:12,marginTop:7,flexWrap:'wrap'}}>
            {Object.entries(CATS).map(([c,ic])=>{const n=todos.filter(t=>t.category===c&&!t.done).length;return n>0?<span key={c} style={{fontSize:11,color:C.muted}}>{ic} {n} {c}</span>:null})}
          </div>
        </div>

        {/* SECTIONS */}
        {orderedSecs.map(secId=>{

          // ── TIMETABLE ──
          if(secId==='timetable')return(
            <Section key="timetable" id="timetable" title="📅 Timetable" actions={<>
              <button style={btnG} onClick={()=>setShowTTImport(s=>!s)}>📂 Import</button>
              <button style={editTT?btnP:btnG} onClick={()=>{setEditTT(e=>!e);setActiveTTCell(null)}}>{editTT?'✓ Done':'✏️ Edit'}</button>
            </>}>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:'none'}} onChange={handleXLSX}/>
              <input ref={calRef} type="file" accept=".docx,.doc" style={{display:'none'}} onChange={handleCalendar}/>
              {showTTImport&&(
                <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:14,marginBottom:14}}>

                  <div style={{fontSize:11,color:C.muted,marginBottom:10,lineHeight:1.7}}>Row 1: blank, Mon, Tue, Wed, Thu, Fri. Rows 2–6: P1–P5 with class names.</div>
                  <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    <button style={btnP} onClick={()=>fileRef.current.click()}>📂 Choose file</button>
                    {Object.keys(presetTT).length>0&&<button style={{...btnG,color:'#ef4444',borderColor:'#ef444444'}} onClick={()=>{setPresetTT({});setTTImportMsg('')}}>Clear preset</button>}
                    <button style={btnG} onClick={()=>setShowTTImport(false)}>Close</button>
                  </div>
                  {ttImportMsg&&<div style={{marginTop:10,fontSize:12,fontWeight:600,color:ttImportMsg.startsWith('✅')?'#22c55e':'#f59e0b'}}>{ttImportMsg}</div>}
                </div>
              )}
              <div style={{display:'grid',gridTemplateColumns:'34px repeat(5,1fr)',gap:4}}>
                <div/>
                {DAYS.map((_,i)=>(
                  <div key={i} style={{textAlign:'center',padding:'5px 4px',borderRadius:7,fontSize:11,fontWeight:700,color:isThisWeek&&i===todayInfo.dayIdx?C.todayBorder:C.muted,background:isThisWeek&&i===todayInfo.dayIdx?C.todayBg:'transparent',border:isThisWeek&&i===todayInfo.dayIdx?`1px solid ${C.todayBorder}44`:'1px solid transparent'}}>
                    {DSHORT[i]}<div style={{fontSize:10,fontWeight:400,opacity:0.7}}>{getDateForDay(weekObj.monday,i)}</div>
                  </div>
                ))}
                {PERIODS.map(period=>(
                  <React.Fragment key={period}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:5,fontSize:10,fontWeight:700,color:C.muted}}>{period}</div>
                    {DAYS.map((_,di)=><TTCell key={`${di}_${period}`} di={di} period={period}/>)}
                  </React.Fragment>
                ))}
              </div>
              {editTT&&<div style={{marginTop:10,fontSize:11,color:C.muted}}>Click a cell to edit.{Object.keys(presetTT).length>0?' Imported classes appear as quick-select options.':''}</div>}
            </Section>
          );

          // ── TASKS ──
          if(secId==='tasks')return vis('tasks')?(
            <Section key="tasks" id="tasks" title="✅ Tasks" actions={<>
              <select style={sel} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
                <option value="all">All categories</option>
                {Object.entries(CATS).map(([c,ic])=><option key={c} value={c}>{ic} {c}</option>)}
              </select>
              <button style={btnP} onClick={()=>setShowAddTask(s=>!s)}>{showAddTask?'✕':'+ Add'}</button>
            </>}>
              {showAddTask&&(
                <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:12,marginBottom:12}}>
                  <input style={inp} autoFocus placeholder="Task description…" value={newTask.text} onChange={e=>setNewTask(p=>({...p,text:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addTask()}/>
                  <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
                    <select style={sel} value={newTask.priority} onChange={e=>setNewTask(p=>({...p,priority:e.target.value}))}>
                      <option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">🟢 Low</option>
                    </select>
                    <select style={sel} value={newTask.category} onChange={e=>setNewTask(p=>({...p,category:e.target.value}))}>
                      {Object.entries(CATS).map(([c,ic])=><option key={c} value={c}>{ic} {c}</option>)}
                    </select>
                    <select style={sel} value={newTask.dueDay} onChange={e=>setNewTask(p=>({...p,dueDay:Number(e.target.value)}))}>
                      <option value={-1}>Any day</option>{DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
                    </select>
                    <button style={btnP} onClick={addTask}>Add</button>
                  </div>
                </div>
              )}
              {pendingTasks.length===0?<div style={{textAlign:'center',color:C.muted,padding:'28px 0'}}><div style={{fontSize:24,marginBottom:6}}>✨</div><div style={{fontWeight:600}}>All clear</div><div style={{fontSize:11}}>No pending tasks</div></div>
                :pendingTasks.map(t=><TaskRow key={t.id} t={t}/>)}
              {doneTasks.length>0&&(
                <div style={{marginTop:10}}>
                  <button onClick={()=>setShowCompleted(s=>!s)} style={{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:12,fontWeight:600,padding:'6px 0',width:'100%'}}>
                    <span style={{fontSize:10,display:'inline-block',transform:showCompleted?'rotate(90deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▶</span>
                    Completed ({doneTasks.length})
                    <div style={{flex:1,height:1,background:C.border,marginLeft:4}}/>
                  </button>
                  {showCompleted&&<div style={{opacity:0.55}}>{doneTasks.map(t=><TaskRow key={t.id} t={t}/>)}</div>}
                </div>
              )}
            </Section>
          ):null;

          // ── STATS ──
          if(secId==='stats')return(
            <Section key="stats" id="stats" title="📊 Stats" actions={null}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
                {[{l:'Total',v:todos.length,ic:'📋',c:C.muted},{l:'Done',v:todos.filter(t=>t.done).length,ic:'✅',c:'#22c55e'},{l:'Pending',v:todos.filter(t=>!t.done).length,ic:'⏳',c:C.accent},{l:'Urgent',v:todos.filter(t=>t.priority==='high'&&!t.done).length,ic:'🔴',c:'#ef4444'}].map(s=>(
                  <div key={s.l} style={{background:C.surface2,border:`1px solid ${C.border}`,borderRadius:9,padding:'12px 8px',textAlign:'center'}}>
                    <div style={{fontSize:20}}>{s.ic}</div>
                    <div style={{fontSize:22,fontWeight:800,color:s.c,lineHeight:1.2}}>{s.v}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'0 24px'}}>
                {Object.entries(CATS).map(([cat,ic])=>{
                  const total=todos.filter(t=>t.category===cat).length;if(!total)return null;
                  const done=todos.filter(t=>t.category===cat&&t.done).length;
                  return<div key={cat} style={{marginBottom:10}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:11}}>{ic} {cat}</span><span style={{fontSize:10,color:C.muted}}>{done}/{total}</span></div>
                    <div style={{height:4,background:C.border,borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',width:`${Math.round(done/total*100)}%`,background:C.accent,borderRadius:2,transition:'width 0.4s'}}/></div>
                  </div>;
                })}
              </div>
              {!todos.length&&<div style={{fontSize:11,color:C.muted,textAlign:'center'}}>Add tasks to see stats</div>}
            </Section>
          );

          // ── HOY ──
          if(secId==='hoy')return(
            <Section key="hoy" id="hoy" title="🧑‍🤝‍🧑 HOY — Student Concerns & Parent Contacts" actions={<>
              <button style={btnP} onClick={()=>setShowAddConcern(s=>!s)}>{showAddConcern?'✕ Concern':'+ Concern'}</button>
              <button style={btnG} onClick={()=>setShowAddContact(s=>!s)}>{showAddContact?'✕ Contact':'+ Contact'}</button>
            </>}>
              {showAddConcern&&(
                <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:12,marginBottom:14}}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:10,color:C.accent}}>New student concern</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <input style={inp} placeholder="Student name" value={newConcern.student} onChange={e=>setNewConcern(p=>({...p,student:e.target.value}))}/>
                    <select style={{...sel,width:'100%'}} value={newConcern.rag} onChange={e=>setNewConcern(p=>({...p,rag:e.target.value}))}>
                      <option value="red">🔴 Red</option><option value="amber">🟡 Amber</option><option value="green">🟢 Green</option>
                    </select>
                  </div>
                  <textarea style={{...inp,marginBottom:8,resize:'vertical',minHeight:56}} placeholder="Concern / observation" value={newConcern.concern} onChange={e=>setNewConcern(p=>({...p,concern:e.target.value}))}/>
                  <textarea style={{...inp,marginBottom:8,resize:'vertical',minHeight:46}} placeholder="Action taken" value={newConcern.action} onChange={e=>setNewConcern(p=>({...p,action:e.target.value}))}/>
                  <div style={{display:'flex',gap:8}}>
                    <input style={{...inp,flex:1}} placeholder="Follow-up date" value={newConcern.followUp} onChange={e=>setNewConcern(p=>({...p,followUp:e.target.value}))}/>
                    <button style={btnP} onClick={addConcern}>Save</button>
                  </div>
                </div>
              )}
              {showAddContact&&(
                <div style={{background:dark?'#1a1a2e':'#f5f3ff',border:'1px solid #8b5cf644',borderRadius:10,padding:12,marginBottom:14}}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:10,color:'#8b5cf6'}}>Log parent contact</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <input style={inp} placeholder="Student name" value={newContact.student} onChange={e=>setNewContact(p=>({...p,student:e.target.value}))}/>
                    <select style={{...sel,width:'100%'}} value={newContact.method} onChange={e=>setNewContact(p=>({...p,method:e.target.value}))}>
                      {CMETHODS.map(m=><option key={m}>{m}</option>)}
                    </select>
                  </div>
                  <textarea style={{...inp,marginBottom:8,resize:'vertical',minHeight:56}} placeholder="Outcome / notes" value={newContact.outcome} onChange={e=>setNewContact(p=>({...p,outcome:e.target.value}))}/>
                  <div style={{display:'flex',gap:8}}>
                    <input style={{...inp,flex:1}} placeholder="Next step / follow-up" value={newContact.followUp} onChange={e=>setNewContact(p=>({...p,followUp:e.target.value}))}/>
                    <button style={btnP} onClick={addContact}>Log</button>
                  </div>
                </div>
              )}
              {weekConcerns.length>0&&<>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}}>Concerns ({weekConcerns.length})</div>
                {weekConcerns.map(c=>(
                  <div key={c.id} style={{borderRadius:10,border:`1px solid ${RAG[c.rag].c}44`,padding:12,marginBottom:8,background:dark?RAG[c.rag].bgd:RAG[c.rag].bg+'88'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                      <span style={{fontWeight:700}}>{c.student}</span>
                      <div style={{display:'flex',gap:6,alignItems:'center'}}>
                        <select style={{...sel,fontSize:11,padding:'3px 7px'}} value={c.rag} onChange={e=>updateConcernRag(c.id,e.target.value)}>
                          <option value="red">🔴 Red</option><option value="amber">🟡 Amber</option><option value="green">🟢 Green</option>
                        </select>
                        <button style={btnSm} onClick={()=>deleteConcern(c.id)}>✕</button>
                      </div>
                    </div>
                    {c.concern&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:C.muted,fontWeight:600}}>Concern: </span>{c.concern}</div>}
                    {c.action&&<div style={{fontSize:12,marginBottom:3}}><span style={{color:C.muted,fontWeight:600}}>Action: </span>{c.action}</div>}
                    {c.followUp&&<div style={{fontSize:11,color:C.muted}}>📅 Follow-up: {c.followUp}</div>}
                  </div>
                ))}
              </>}
              {weekContacts.length>0&&<>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8,marginTop:weekConcerns.length>0?14:0}}>Parent contacts ({weekContacts.length})</div>
                <div style={{overflowX:'auto'}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead><tr style={{borderBottom:`2px solid ${C.border}`}}>
                      {['Date','Student','Method','Outcome','Next step',''].map(h=><th key={h} style={{textAlign:'left',padding:'6px 8px',color:C.muted,fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{h}</th>)}
                    </tr></thead>
                    <tbody>{weekContacts.map(c=>(
                      <tr key={c.id} style={{borderBottom:`1px solid ${C.border}`}}>
                        <td style={{padding:'8px',color:C.muted,whiteSpace:'nowrap'}}>{c.date}</td>
                        <td style={{padding:'8px',fontWeight:600}}>{c.student}</td>
                        <td style={{padding:'8px'}}><span style={{background:C.accentBg,color:C.accent,borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:600}}>{c.method}</span></td>
                        <td style={{padding:'8px',maxWidth:200}}>{c.outcome}</td>
                        <td style={{padding:'8px',maxWidth:160,color:C.muted}}>{c.followUp}</td>
                        <td style={{padding:'8px'}}><button style={btnSm} onClick={()=>deleteContact(c.id)}>✕</button></td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </>}
              {weekConcerns.length===0&&weekContacts.length===0&&<div style={{color:C.muted,fontSize:12,textAlign:'center',padding:'24px 0'}}>No concerns or contacts logged this week</div>}
            </Section>
          );

          // ── HOMEWORK ──
          if(secId==='homework')return(
            <Section key="homework" id="homework" title="✏️ Homework & Deadline Tracker" actions={<button style={btnP} onClick={()=>setShowAddHW(s=>!s)}>{showAddHW?'✕':'+ Add'}</button>}>
              {showAddHW&&(
                <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:12,marginBottom:12}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <input style={inp} placeholder="Class / group (e.g. 11A Econ)" value={newHW.classGroup} onChange={e=>setNewHW(p=>({...p,classGroup:e.target.value}))}/>
                    <input style={inp} placeholder="Task set" value={newHW.task} onChange={e=>setNewHW(p=>({...p,task:e.target.value}))}/>
                    <input style={inp} placeholder="Date set" value={newHW.set} onChange={e=>setNewHW(p=>({...p,set:e.target.value}))}/>
                    <input style={inp} placeholder="Due date" value={newHW.due} onChange={e=>setNewHW(p=>({...p,due:e.target.value}))}/>
                  </div>
                  <button style={btnP} onClick={addHW}>Add</button>
                </div>
              )}
              {homework.length===0?<div style={{color:C.muted,fontSize:12,textAlign:'center',padding:'24px 0'}}>No homework logged yet</div>
                :homework.map(h=>(
                  <div key={h.id} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'10px',borderRadius:9,marginBottom:6,background:h.returned?(dark?'#052e16':'#f0fdf4'):C.surface2,border:`1px solid ${h.returned?'#22c55e44':C.border}`,opacity:h.returned?0.6:1}}>
                    <button onClick={()=>toggleHW(h.id)} style={{flexShrink:0,marginTop:2,width:17,height:17,borderRadius:4,border:`2px solid ${h.returned?'#22c55e':C.border}`,background:h.returned?'#22c55e':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {h.returned&&<span style={{color:'#fff',fontSize:10,fontWeight:800}}>✓</span>}
                    </button>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,marginBottom:2}}>{h.classGroup}</div>
                      <div style={{fontSize:12,color:C.muted,marginBottom:2}}>{h.task}</div>
                      <div style={{display:'flex',gap:10,fontSize:11,color:C.muted,flexWrap:'wrap',alignItems:'center'}}>
                        {h.set&&<span>Set: {h.set}</span>}
                        {h.due&&<span style={{color:h.returned?'#22c55e':'#f59e0b',fontWeight:600}}>Due: {h.due}</span>}
                        {h.createdWeek&&h.createdWeek!==selWeek&&!h.returned&&<span style={{fontSize:10,color:'#f59e0b',background:dark?'#3b2700':'#fffbeb',padding:'1px 6px',borderRadius:20,border:'1px solid #f59e0b44'}}>carried</span>}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                      <span style={{fontSize:11,color:h.returned?'#22c55e':C.muted}}>{h.returned?'Returned':'Pending'}</span>
                      <button style={btnSm} onClick={()=>deleteHW(h.id)}>✕</button>
                    </div>
                  </div>
                ))
              }
            </Section>
          );

          // ── COVER ──
          if(secId==='cover')return(
            <Section key="cover" id="cover" title="🔄 Cover & Absence Notes" actions={<button style={btnP} onClick={()=>setShowAddCover(s=>!s)}>{showAddCover?'✕':'+ Add'}</button>}>
              {showAddCover&&(
                <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:12,marginBottom:12}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                    <input style={inp} placeholder="Class / group" value={newCover.classGroup} onChange={e=>setNewCover(p=>({...p,classGroup:e.target.value}))}/>
                    <select style={{...sel,width:'100%'}} value={newCover.day} onChange={e=>setNewCover(p=>({...p,day:Number(e.target.value)}))}>
                      {DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
                    </select>
                  </div>
                  <textarea style={{...inp,resize:'vertical',minHeight:80,marginBottom:8}} placeholder="Work set / notes for cover teacher" value={newCover.work} onChange={e=>setNewCover(p=>({...p,work:e.target.value}))}/>
                  <button style={btnP} onClick={addCover}>Save</button>
                </div>
              )}
              {weekCover.length===0?<div style={{color:C.muted,fontSize:12,textAlign:'center',padding:'24px 0'}}>No cover notes this week</div>
                :weekCover.map(c=>(
                  <div key={c.id} style={{padding:'12px',borderRadius:9,marginBottom:8,background:C.surface2,border:`1px solid ${C.border}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <span style={{fontWeight:700}}>{c.classGroup}</span>
                        <span style={{fontSize:11,color:C.accent,background:C.accentBg,padding:'2px 8px',borderRadius:20,fontWeight:600}}>{DAYS[c.day]}</span>
                      </div>
                      <button style={btnSm} onClick={()=>deleteCover(c.id)}>✕</button>
                    </div>
                    <div style={{fontSize:12,lineHeight:1.6}}>{c.work}</div>
                  </div>
                ))
              }
            </Section>
          );

          // ── KEY DATES ──
          if(secId==='keydates')return(
            <Section key="keydates" id="keydates" title="📌 Key Dates" actions={<>
              <button style={btnG} onClick={()=>setShowCalImport(s=>!s)}>📄 Import calendar</button>
              <button style={btnP} onClick={()=>setShowAddDate(s=>!s)}>{showAddDate?'✕':'+ Add date'}</button>
            </>}>
              {showCalImport&&(
                <div style={{background:dark?'#0d2018':'#f0fdf4',border:'1px solid #22c55e44',borderRadius:12,padding:16,marginBottom:16}}>
                  <div style={{fontWeight:700,fontSize:13,color:'#22c55e',marginBottom:6}}>📄 Import yearly calendar from Word</div>
                  <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.7}}>Upload your school calendar .docx file. Claude will extract all dates automatically.</div>
                  <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:calMsg?10:0}}>
                    <button style={{...btnP,background:'#22c55e'}} onClick={()=>calRef.current.click()} disabled={calImporting}>{calImporting?'⏳ Reading…':'📂 Choose .docx file'}</button>
                    {keyDates.some(d=>d.source==='imported')&&<button style={{...btnG,color:'#ef4444',borderColor:'#ef444444'}} onClick={()=>setKeyDates(p=>p.filter(d=>d.source!=='imported'))}>🗑 Clear imported</button>}
                    <button style={btnG} onClick={()=>{setShowCalImport(false);setCalPreview(null);setCalMsg('')}}>Close</button>
                  </div>
                  {calMsg&&<div style={{fontSize:12,fontWeight:600,color:calMsg.startsWith('✅')||calMsg.startsWith('✓')?'#22c55e':calMsg.startsWith('❌')?'#ef4444':'#f59e0b',marginTop:8}}>{calMsg}</div>}
                  {calPreview&&calPreview.length>0&&(
                    <div style={{marginTop:14}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
                        <span style={{fontSize:12,fontWeight:700}}>Review — untick to exclude</span>
                        <div style={{display:'flex',gap:8}}>
                          <button style={btnG} onClick={()=>setCalPreview(p=>p.map(i=>({...i,keep:true})))}>All</button>
                          <button style={btnG} onClick={()=>setCalPreview(p=>p.map(i=>({...i,keep:false})))}>None</button>
                          <button style={{...btnP,background:'#22c55e'}} onClick={confirmCalImport}>✓ Import {calPreview.filter(i=>i.keep).length}</button>
                        </div>
                      </div>
                      <div style={{maxHeight:300,overflowY:'auto',border:`1px solid ${C.border}`,borderRadius:8}}>
                        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                          <thead style={{position:'sticky',top:0,background:C.surface2}}>
                            <tr style={{borderBottom:`2px solid ${C.border}`}}>
                              {['','Date','Event','Category'].map(h=><th key={h} style={{textAlign:'left',padding:'7px 10px',color:C.muted,fontWeight:600,fontSize:11}}>{h}</th>)}
                            </tr>
                          </thead>
                          <tbody>{calPreview.map(item=>(
                            <tr key={item.id} style={{borderBottom:`1px solid ${C.border}`,opacity:item.keep?1:0.35}}>
                              <td style={{padding:'6px 10px'}}><button onClick={()=>togglePreview(item.id)} style={{width:15,height:15,borderRadius:3,border:`2px solid ${item.keep?'#22c55e':C.border}`,background:item.keep?'#22c55e':'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>{item.keep&&<span style={{color:'#fff',fontSize:9,fontWeight:800}}>✓</span>}</button></td>
                              <td style={{padding:'6px 10px',color:C.muted,whiteSpace:'nowrap'}}>{item.date?new Date(item.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}):'—'}</td>
                              <td style={{padding:'6px 10px',fontWeight:500}}>{item.label}</td>
                              <td style={{padding:'6px 10px'}}><span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:C.accentBg,color:C.accent}}>{item.category}</span></td>
                            </tr>
                          ))}</tbody>
                        </table>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {showAddDate&&(
                <div style={{background:C.accentBg,border:`1px solid ${C.accent}44`,borderRadius:10,padding:12,marginBottom:12}}>
                  <div style={{display:'grid',gridTemplateColumns:'1fr auto auto',gap:8,marginBottom:8}}>
                    <input style={inp} placeholder="Label (e.g. Parents Evening)" value={newDate.label} onChange={e=>setNewDate(p=>({...p,label:e.target.value}))}/>
                    <input style={{...inp,width:'auto'}} type="date" value={newDate.date} onChange={e=>setNewDate(p=>({...p,date:e.target.value}))}/>
                    <select style={sel} value={newDate.category} onChange={e=>setNewDate(p=>({...p,category:e.target.value}))}>
                      {['general','exam','report','parents evening','INSET','assembly','trip','deadline'].map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <button style={btnP} onClick={addKeyDate}>Add</button>
                </div>
              )}
              {keyDates.length===0?<div style={{color:C.muted,fontSize:12,textAlign:'center',padding:'24px 0'}}>No key dates yet — add manually or import your school calendar</div>
                :(()=>{
                  const future=keyDates.filter(d=>d.date>=todayStr),past=keyDates.filter(d=>d.date<todayStr);
                  const impCount=keyDates.filter(d=>d.source==='imported').length;
                  return<>
                    {impCount>0&&<div style={{fontSize:11,color:'#22c55e',background:dark?'#052e16':'#f0fdf4',border:'1px solid #22c55e33',borderRadius:8,padding:'6px 12px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span>📄 {impCount} events imported</span>
                      <button style={{...btnSm,color:'#ef4444',fontSize:11}} onClick={()=>setKeyDates(p=>p.filter(d=>d.source!=='imported'))}>Clear</button>
                    </div>}
                    {future.map(d=>(
                      <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 12px',borderRadius:9,marginBottom:6,background:C.surface2,border:`1px solid ${C.border}`,borderLeft:`4px solid ${d.source==='imported'?'#22c55e':C.accent}`}}>
                        <div style={{flex:1,minWidth:0}}><span style={{fontWeight:600}}>{d.label}</span><span style={{marginLeft:8,fontSize:11,color:C.accent,background:C.accentBg,padding:'2px 8px',borderRadius:20}}>{d.category}</span>{d.source==='imported'&&<span style={{marginLeft:6,fontSize:10,color:'#22c55e',opacity:0.7}}>imported</span>}</div>
                        <span style={{fontSize:12,color:C.muted,whiteSpace:'nowrap'}}>{new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
                        <button style={btnSm} onClick={()=>deleteKeyDate(d.id)}>✕</button>
                      </div>
                    ))}
                    {past.length>0&&<><div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:'uppercase',letterSpacing:'0.07em',margin:'12px 0 6px'}}>Past</div>
                      {past.map(d=>(
                        <div key={d.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',borderRadius:9,marginBottom:4,opacity:0.4,background:C.surface2,border:`1px solid ${C.border}`}}>
                          <div style={{flex:1,fontSize:12}}>{d.label} <span style={{color:C.muted}}>— {d.category}</span></div>
                          <span style={{fontSize:11,color:C.muted}}>{new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>
                          <button style={btnSm} onClick={()=>deleteKeyDate(d.id)}>✕</button>
                        </div>
                      ))}
                    </>}
                  </>;
                })()
              }
            </Section>
          );

          // ── NOTES ──
          if(secId==='notes')return(
            <Section key="notes" id="notes" title="📝 Week Notes" actions={null}>
              <textarea style={{...inp,resize:'vertical',minHeight:120,lineHeight:1.6,fontFamily:'inherit'}}
                placeholder={"HOY notes, welfare concerns, parent contacts, upcoming deadlines…"}
                value={weekNotes} onChange={e=>setNotes(p=>({...p,[wk]:e.target.value}))}/>
            </Section>
          );

          // ── REFLECT ──
          if(secId==='reflect')return(
            <Section key="reflect" id="reflect" title="💬 End-of-Week Reflection" actions={null}>
              <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:18}}>
                <span style={{fontSize:12,color:C.muted}}>How was this week?</span>
                {[1,2,3,4,5].map(n=>(
                  <button key={n} onClick={()=>updateReflect('rating',n)} style={{background:'none',border:'none',cursor:'pointer',fontSize:22,opacity:weekReflect.rating>=n?1:0.22,transition:'opacity 0.15s',padding:'1px 2px'}}>⭐</button>
                ))}
                {weekReflect.rating>0&&<span style={{fontSize:12,color:C.muted}}>({weekReflect.rating}/5)</span>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <div>
                  <span style={lbl}>✅ What went well?</span>
                  <textarea style={{...inp,resize:'vertical',minHeight:100,lineHeight:1.7}} placeholder="Lessons that landed, pastoral wins, personal achievements…" value={weekReflect.wentWell} onChange={e=>updateReflect('wentWell',e.target.value)}/>
                </div>
                <div>
                  <span style={lbl}>🔁 What needs following up?</span>
                  <textarea style={{...inp,resize:'vertical',minHeight:100,lineHeight:1.7}} placeholder="Students to check in on, tasks to carry over, conversations to have…" value={weekReflect.followUp} onChange={e=>updateReflect('followUp',e.target.value)}/>
                </div>
              </div>
            </Section>
          );

          return null;
        })}
      </div>
    </div>
  );
}

// ── App root — handles auth flow ─────────────────────────────────────────────
function App(){
  const [dark]=useState(()=>load('tp_dark',false));
  const [unlocked,setUnlocked]=useState(false);
  const [gistReady,setGistReady]=useState(()=>!!load('mzr_gist_token',''));
  const [showGistSetup,setShowGistSetup]=useState(false);

  // Check if first-time gist setup needed after unlock
  function handleUnlock(){
    const hasToken=!!load('mzr_gist_token','');
    const skipped=load('mzr_gist_skipped',false);
    if(!hasToken&&!skipped){setShowGistSetup(true)}
    else{setUnlocked(true)}
  }

  if(!unlocked&&!showGistSetup)return<PasswordScreen dark={dark} onUnlock={handleUnlock}/>;
  if(showGistSetup)return<GistSetup dark={dark}
    onDone={(tok,id)=>{save('mzr_gist_token',tok);save('mzr_gist_id',id);setShowGistSetup(false);setUnlocked(true)}}
    onSkip={()=>{save('mzr_gist_skipped',true);setShowGistSetup(false);setUnlocked(true)}}/>;
  return<Planner/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
