<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MZR Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;font-size:13px}
input,select,textarea,button{font-family:inherit;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#94a3b855;border-radius:3px}

<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
async function hashPw(pw){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}

// School weeks: start Mon 31 Aug 2026, alternating TT week 1/2
function getWeeks(){
  const weeks=[];
  let d=new Date(2026,7,31);
  while(d.getDay()!==1)d.setDate(d.getDate()+1);
  const end=new Date(2027,6,25);
  let n=1;
  while(d<=end){
    const mon=new Date(d),fri=new Date(d);fri.setDate(fri.getDate()+4);
    const fmt=dt=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const ttW=n%2===1?1:2;
    weeks.push({id:n,label:`Week ${n}: ${fmt(mon)}–${fmt(fri)} · TT${ttW}`,monday:new Date(mon),ttW});
    d.setDate(d.getDate()+7);n++;
  }
  return weeks;
}
const WEEKS=getWeeks();
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DS=['Mon','Tue','Wed','Thu','Fri'];
const PER=['P1','P2','P3','P4','P5'];
const CATS={teaching:'📚',pastoral:'🧑‍🤝‍🧑',admin:'📋',marking:'✏️',meeting:'🗓',personal:'⭐'};
const PRI={high:{l:'High',c:'#ef4444',bg:'#fef2f2',bgd:'#3f1212'},medium:{l:'Med',c:'#f59e0b',bg:'#fffbeb',bgd:'#3b2700'},low:{l:'Low',c:'#22c55e',bg:'#f0fdf4',bgd:'#052e16'}};
const RAG={red:{l:'Red',c:'#ef4444',bg:'#fef2f2',bgd:'#3f1212'},amber:{l:'Amber',c:'#f59e0b',bg:'#fffbeb',bgd:'#3b2700'},green:{l:'Green',c:'#22c55e',bg:'#f0fdf4',bgd:'#052e16'}};
const CM=['Call','Email','Teams','Letter','In person','Text'];

function getTodayInfo(){
  const t=new Date();t.setHours(0,0,0,0);
  for(const w of WEEKS){const m=new Date(w.monday);m.setHours(0,0,0,0);const f=new Date(m);f.setDate(f.getDate()+4);if(t>=m&&t<=f)return{weekId:w.id,dayIdx:Math.min(Math.max(t.getDay()-1,0),4)}}
  return{weekId:1,dayIdx:0};
}
function dayFmt(monday,i){const d=new Date(monday);d.setDate(d.getDate()+i);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}

async function gistLoad(tok,gid){
  const r=await fetch(`https://api.github.com/gists/${gid}`,{headers:{Authorization:`token ${tok}`,'Accept':'application/vnd.github.v3+json'}});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.slice(0,100)}`)}
  const d=await r.json();const c=d.files['mzr-planner-data.json']?.content;return c?JSON.parse(c):null;
}
async function gistSave(tok,gid,payload){
  const r=await fetch(`https://api.github.com/gists/${gid}`,{method:'PATCH',headers:{Authorization:`token ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'mzr-planner-data.json':{content:JSON.stringify(payload,null,2)}}})});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.slice(0,100)}`)}
}
async function gistCreate(tok){
  const r=await fetch('https://api.github.com/gists',{method:'POST',headers:{Authorization:`token ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({description:'MZR Planner Data',public:false,files:{'mzr-planner-data.json':{content:'{}'}}})});
  if(!r.ok)throw new Error('Failed to create Gist');
  return(await r.json()).id;
}

// ── Password Screen ──────────────────────────────────────────────────────────
function PasswordScreen({onUnlock,dark}){
  const C=dark?{bg:'#0d1117',sur:'#161b22',bor:'#30363d',txt:'#e6edf3',mut:'#8b949e',acc:'#818cf8'}:{bg:'#f0f2f5',sur:'#ffffff',bor:'#e2e8f0',txt:'#0f172a',mut:'#64748b',acc:'#4f46e5'};
  const [mode,setMode]=useState(()=>load('mzr_pwhash',null)?'login':'setup');
  const [pw,setPw]=useState('');const [pw2,setPw2]=useState('');const [err,setErr]=useState('');const [busy,setBusy]=useState(false);
  const si={width:'100%',background:C.bg,border:`1px solid ${err?'#ef4444':C.bor}`,color:C.txt,borderRadius:8,padding:'10px 12px',outline:'none',boxSizing:'border-box',marginBottom:10};
  async function setup(){if(pw.length<4){setErr('Min 4 characters');return}if(pw!==pw2){setErr('Passwords do not match');return}setBusy(true);save('mzr_pwhash',await hashPw(pw));setBusy(false);onUnlock()}
  async function login(){setBusy(true);const h=await hashPw(pw);if(h===load('mzr_pwhash',null)){onUnlock()}else{setErr('Incorrect password');setPw('')}setBusy(false)}
  return(<div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:C.sur,border:`1px solid ${C.bor}`,borderRadius:16,padding:36,width:'100%',maxWidth:380,boxShadow:'0 8px 32px rgba(0,0,0,0.12)'}}>
      <div style={{textAlign:'center',marginBottom:28}}><div style={{fontSize:36,marginBottom:8}}>🎓</div><div style={{fontSize:20,fontWeight:800,color:C.acc}}>MZR Planner</div><div style={{fontSize:12,color:C.mut,marginTop:4}}>{mode==='setup'?'Create your password':'Enter your password'}</div></div>
      <input type="password" placeholder="Password" value={pw} onChange={e=>{setPw(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&(mode==='setup'?pw2?setup():document.getElementById('pw2')?.focus():login())} style={si} autoFocus/>
      {mode==='setup'&&<input id="pw2" type="password" placeholder="Confirm password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&setup()} style={si}/>}
      {err&&<div style={{color:'#ef4444',fontSize:12,marginBottom:10}}>{err}</div>}
      <button onClick={mode==='setup'?setup:login} disabled={busy} style={{width:'100%',background:C.acc,color:'#fff',border:'none',borderRadius:8,padding:'11px',fontWeight:700,fontSize:14,cursor:'pointer'}}>{busy?'…':mode==='setup'?'Set password & open':'Unlock'}</button>
      {mode==='login'&&<button onClick={()=>{if(confirm('Clear password?')){localStorage.removeItem('mzr_pwhash');setMode('setup');setPw('');setErr('')}}} style={{width:'100%',background:'none',border:'none',color:C.mut,fontSize:11,cursor:'pointer',marginTop:12,padding:4}}>Forgot password / reset</button>}
    </div></div>);
}

// ── Gist Setup Screen ────────────────────────────────────────────────────────
function GistSetup({onDone,onSkip,dark}){
  const C=dark?{bg:'#0d1117',sur:'#161b22',bor:'#30363d',txt:'#e6edf3',mut:'#8b949e',acc:'#818cf8',abg:'#1e2044'}:{bg:'#f0f2f5',sur:'#ffffff',bor:'#e2e8f0',txt:'#0f172a',mut:'#64748b',acc:'#4f46e5',abg:'#eef2ff'};
  const [tok,setTok]=useState('');const [st,setSt]=useState('');const [busy,setBusy]=useState(false);
  const si={width:'100%',background:C.bg,border:`1px solid ${C.bor}`,color:C.txt,borderRadius:8,padding:'9px 12px',outline:'none',boxSizing:'border-box',marginBottom:10};
  async function connect(){if(!tok.trim()){setSt('❌ Enter a token');return}setBusy(true);setSt('Connecting…');
    try{
      const lr=await fetch('https://api.github.com/gists',{headers:{Authorization:`token ${tok.trim()}`,'Accept':'application/vnd.github.v3+json'}});
      if(!lr.ok)throw new Error(`Token error: ${lr.status}`);
      const gists=await lr.json();
      const ex=gists.find(g=>g.description==='MZR Planner Data'&&g.files['mzr-planner-data.json']);
      let gid=ex?ex.id:await gistCreate(tok.trim());
      setSt(ex?'✅ Found existing Gist!':'✅ New Gist created!');
      save('mzr_gist_token',tok.trim());save('mzr_gist_id',gid);
      setTimeout(()=>onDone(tok.trim(),gid),700);
    }catch(e){setSt('❌ '+e.message)}
    setBusy(false);
  }
  return(<div style={{minHeight:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:C.sur,border:`1px solid ${C.bor}`,borderRadius:16,padding:32,width:'100%',maxWidth:480}}>
      <div style={{fontSize:18,fontWeight:800,color:C.acc,marginBottom:4}}>☁️ Enable sync</div>
      <div style={{fontSize:12,color:C.mut,marginBottom:16,lineHeight:1.7}}>Paste your GitHub token. The planner finds your existing Gist automatically, or creates a new one.</div>
      <div style={{background:C.abg,border:`1px solid ${C.acc}44`,borderRadius:10,padding:12,marginBottom:14,fontSize:12,lineHeight:1.8,color:C.txt}}>
        <b>Get a token:</b> github.com → Settings → Developer settings → Personal access tokens → <b>Tokens (classic)</b> → Generate → tick <b>gist</b> only
      </div>
      <input type="password" placeholder="Paste GitHub token" value={tok} onChange={e=>setTok(e.target.value)} onKeyDown={e=>e.key==='Enter'&&connect()} style={si}/>
      {st&&<div style={{fontSize:12,fontWeight:600,color:st.startsWith('✅')?'#22c55e':st.startsWith('❌')?'#ef4444':C.mut,marginBottom:10}}>{st}</div>}
      <button onClick={connect} disabled={busy} style={{width:'100%',background:C.acc,color:'#fff',border:'none',borderRadius:8,padding:'10px',fontWeight:700,cursor:'pointer',marginBottom:8}}>{busy?'Connecting…':'Connect & enable sync'}</button>
      <button onClick={onSkip} style={{width:'100%',background:'none',border:`1px solid ${C.bor}`,color:C.mut,borderRadius:8,padding:'9px',cursor:'pointer',fontSize:12}}>Skip — use local storage only</button>
    </div></div>);
}

// ── Main Planner ─────────────────────────────────────────────────────────────
function Planner(){
  const today=getTodayInfo();
  const [dark,setDark]=useState(()=>load('tp_dark',false));
  const [selWeek,setSelWeek]=useState(()=>load('tp_week',today.weekId));
  const [focusMode,setFocusMode]=useState(false);
  const [vis,setVis]=useState(()=>{const s=load('tp_vis',null),all=['timetable','tasks','stats','hoy','homework','cover','keydates','notes','reflect'];if(!s)return all.filter(x=>x!=='reflect');return[...new Set([...s.filter(x=>all.includes(x)),...all.filter(x=>!s.includes(x)&&x!=='reflect')])];});
  const [showManage,setShowManage]=useState(false);

  // Global data
  const [todos,setTodos]=useState(()=>{const v=load('tp_todos',[]);return Array.isArray(v)?v:[]});
  const [hw,setHw]=useState(()=>{const v=load('tp_hw',[]);return Array.isArray(v)?v:[]});
  const [tt1,setTT1]=useState(()=>load('tp_tt1',{})); // preset Week 1
  const [tt2,setTT2]=useState(()=>load('tp_tt2',{})); // preset Week 2
  const [ttVer,setTTVer]=useState(()=>load('tp_tt_ver',{})); // per-school-week override
  const [keyDates,setKeyDates]=useState(()=>load('tp_kd',[]));

  // Per-week data
  const [notes,setNotes]=useState(()=>load('tp_notes',{}));
  const [reflect,setReflect]=useState(()=>load('tp_refl',{}));
  const [contacts,setContacts]=useState(()=>load('tp_contacts',{}));
  const [concerns,setConcerns]=useState(()=>load('tp_concerns',{}));
  const [cover,setCover]=useState(()=>load('tp_cover',{}));

  // Gist
  const [gistTok,setGistTok]=useState(()=>load('mzr_gist_token',''));
  const [gistId,setGistId]=useState(()=>load('mzr_gist_id',''));
  const [syncSt,setSyncSt]=useState('');
  const [showSync,setShowSync]=useState(false);
  const latTok=useRef(gistTok),latGid=useRef(gistId);
  useEffect(()=>{latTok.current=gistTok},[gistTok]);
  useEffect(()=>{latGid.current=gistId},[gistId]);

  // UI state
  const [editTT,setEditTT]=useState(false);
  const [actCell,setActCell]=useState(null);
  const [showTTImp,setShowTTImp]=useState(false);
  const [ttMsg,setTTMsg]=useState('');
  const [showCalImp,setShowCalImp]=useState(false);
  const [calBusy,setCalBusy]=useState(false);
  const [calPrev,setCalPrev]=useState(null);
  const [calMsg,setCalMsg]=useState('');
  const [showAddTask,setShowAddTask]=useState(false);
  const [showDone,setShowDone]=useState(false);
  const [newTask,setNewTask]=useState({text:'',priority:'medium',category:'teaching',dueDay:-1});
  const [filterCat,setFilterCat]=useState('all');
  const [showAddCon,setShowAddCon]=useState(false);
  const [newCon,setNewCon]=useState({student:'',method:'Call',outcome:'',followUp:''});
  const [showAddConc,setShowAddConc]=useState(false);
  const [newConc,setNewConc]=useState({student:'',concern:'',action:'',rag:'amber',followUp:''});
  const [showAddHw,setShowAddHw]=useState(false);
  const [newHw,setNewHw]=useState({classGroup:'',task:'',set:'',due:''});
  const [showAddCov,setShowAddCov]=useState(false);
  const [newCov,setNewCov]=useState({classGroup:'',day:0,work:''});
  const [showAddDate,setShowAddDate]=useState(false);
  const [newDate,setNewDate]=useState({label:'',date:'',category:'general'});
  const [dbg,setDbg]=useState('');
  const f1=useRef(),f2=useRef(),fc=useRef();

  const wk=`w${selWeek}`;
  const wkObj=WEEKS.find(w=>w.id===selWeek)||WEEKS[0];
  const isTW=selWeek===today.weekId;
  const autoVer=wkObj.ttW||1;
  const curVer=ttVer[wk]!==undefined?ttVer[wk]:autoVer;
  const preset=curVer===2?tt2:tt1;

  // Per-week derived
  const wkTT={}; // no per-week cell overrides — cells write to preset directly
  const wkNotes=notes[wk]||'';
  const wkRefl=reflect[wk]||{wentWell:'',followUp:'',rating:0};
  const wkCon=contacts[wk]||[];
  const wkConc=concerns[wk]||[];
  const wkCov=cover[wk]||[];

  function getTV(di,p){return preset[`${di}_${p}`]||''}
  function setTV(di,p,v){const k=`${di}_${p}`;if(curVer===2)setTT2(x=>({...x,[k]:v}));else setTT1(x=>({...x,[k]:v}))}
  function setWkVer(v){setTTVer(x=>({...x,[wk]:v}))}
  function resetVer(){setTTVer(x=>{const n={...x};delete n[wk];return n})}

  // Persist
  useEffect(()=>save('tp_dark',dark),[dark]);
  useEffect(()=>save('tp_week',selWeek),[selWeek]);
  useEffect(()=>save('tp_todos',todos),[todos]);
  useEffect(()=>save('tp_hw',hw),[hw]);
  useEffect(()=>save('tp_tt1',tt1),[tt1]);
  useEffect(()=>save('tp_tt2',tt2),[tt2]);
  useEffect(()=>save('tp_tt_ver',ttVer),[ttVer]);
  useEffect(()=>save('tp_kd',keyDates),[keyDates]);
  useEffect(()=>save('tp_notes',notes),[notes]);
  useEffect(()=>save('tp_refl',reflect),[reflect]);
  useEffect(()=>save('tp_contacts',contacts),[contacts]);
  useEffect(()=>save('tp_concerns',concerns),[concerns]);
  useEffect(()=>save('tp_cover',cover),[cover]);
  useEffect(()=>save('tp_vis',vis),[vis]);

  // Sync
  function bp(){return{todos,hw,tt1,tt2,ttVer,keyDates,notes,reflect,contacts,concerns,cover,vis,dark}}
  async function syncNow(){const tok=latTok.current,gid=latGid.current;if(!tok||!gid){setShowSync(true);return}setSyncSt('⏳ Saving…');try{await gistSave(tok,gid,bp());setSyncSt('✅ Saved')}catch(e){setSyncSt('❌ '+e.message)}setTimeout(()=>setSyncSt(''),6000)}
  async function loadFromGist(){const tok=latTok.current,gid=latGid.current;if(!tok||!gid){setSyncSt('⚠️ No sync');return}setSyncSt('⏳ Loading…');
    try{const d=await gistLoad(tok,gid);if(d){
      if(Array.isArray(d.todos))setTodos(d.todos);
      if(Array.isArray(d.hw))setHw(d.hw);
      if(d.tt1)setTT1(d.tt1);if(d.tt2)setTT2(d.tt2);if(d.ttVer)setTTVer(d.ttVer);
      if(Array.isArray(d.keyDates))setKeyDates(d.keyDates);
      if(d.notes)setNotes(d.notes);if(d.reflect)setReflect(d.reflect);
      if(d.contacts)setContacts(d.contacts);if(d.concerns)setConcerns(d.concerns);if(d.cover)setCover(d.cover);
      // legacy
      if(!d.tt1&&d.presetTT1)setTT1(d.presetTT1);if(!d.tt2&&d.presetTT2)setTT2(d.presetTT2);
      if(!d.hw&&Array.isArray(d.homework))setHw(d.homework);
      setSyncSt('✅ Loaded from cloud');
    }else setSyncSt('ℹ️ Nothing saved yet')}catch(e){setSyncSt('❌ '+e.message)}
    setTimeout(()=>setSyncSt(''),6000);
  }

  // Data mutations
  function addTask(){if(!newTask.text.trim())return;setTodos(p=>[...p,{id:uid(),...newTask,text:newTask.text.trim(),done:false,createdWeek:selWeek}]);setNewTask({text:'',priority:'medium',category:'teaching',dueDay:-1});setShowAddTask(false)}
  function toggleTask(id){setTodos(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t))}
  function delTask(id){setTodos(p=>p.filter(t=>t.id!==id))}
  function addHw(){if(!newHw.classGroup.trim())return;setHw(p=>[...p,{id:uid(),...newHw,returned:false,cw:selWeek}]);setNewHw({classGroup:'',task:'',set:'',due:''});setShowAddHw(false)}
  function togHw(id){setHw(p=>p.map(h=>h.id===id?{...h,returned:!h.returned}:h))}
  function delHw(id){setHw(p=>p.filter(h=>h.id!==id))}
  function addCon(){if(!newCon.student.trim())return;setContacts(p=>({...p,[wk]:[...(p[wk]||[]),{id:uid(),date:new Date().toLocaleDateString('en-GB'),...newCon}]}));setNewCon({student:'',method:'Call',outcome:'',followUp:''});setShowAddCon(false)}
  function delCon(id){setContacts(p=>({...p,[wk]:(p[wk]||[]).filter(c=>c.id!==id)}))}
  function addConc(){if(!newConc.student.trim())return;setConcerns(p=>({...p,[wk]:[...(p[wk]||[]),{id:uid(),...newConc}]}));setNewConc({student:'',concern:'',action:'',rag:'amber',followUp:''});setShowAddConc(false)}
  function updRag(id,rag){setConcerns(p=>({...p,[wk]:(p[wk]||[]).map(c=>c.id===id?{...c,rag}:c)}))}
  function delConc(id){setConcerns(p=>({...p,[wk]:(p[wk]||[]).filter(c=>c.id!==id)}))}
  function addCov(){if(!newCov.classGroup.trim())return;setCover(p=>({...p,[wk]:[...(p[wk]||[]),{id:uid(),...newCov}]}));setNewCov({classGroup:'',day:0,work:''});setShowAddCov(false)}
  function delCov(id){setCover(p=>({...p,[wk]:(p[wk]||[]).filter(c=>c.id!==id)}))}
  function addDate(){if(!newDate.label.trim()||!newDate.date)return;setKeyDates(p=>[...p,{id:uid(),...newDate}].sort((a,b)=>a.date.localeCompare(b.date)));setNewDate({label:'',date:'',category:'general'});setShowAddDate(false)}
  function delDate(id){setKeyDates(p=>p.filter(d=>d.id!==id))}
  function updRefl(f,v){setReflect(p=>({...p,[wk]:{...(p[wk]||{wentWell:'',followUp:'',rating:0}),[f]:v}}))}
  function togSec(id){setVis(p=>p.includes(id)?p.filter(s=>s!==id):[...p,id])}
  const isVis=id=>vis.includes(id);

  // Excel import
  function handleXLS(e,ver){
    const file=e.target.files[0];if(!file)return;e.target.value='';
    const r=new FileReader();
    r.onload=ev=>{try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const dA={mon:0,monday:0,tue:1,tuesday:1,wed:2,wednesday:2,thu:3,thursday:3,fri:4,friday:4};
      const pA={p1:0,'period 1':0,'1':0,p2:1,'period 2':1,'2':1,p3:2,'period 3':2,'3':2,p4:3,'period 4':3,'4':3,p5:4,'period 5':4,'5':4};
      let hR=-1,dcm={};
      for(let r=0;r<Math.min(rows.length,5);r++){const row=rows[r];let f=0;for(let c=0;c<row.length;c++){const cell=String(row[c]||'').trim().toLowerCase();if(dA[cell]!==undefined){dcm[dA[cell]]=c;f++}}if(f>=3){hR=r;break}}
      if(hR===-1){dcm={0:1,1:2,2:3,3:4,4:5};hR=0}
      const res={};
      for(let r=hR+1;r<rows.length;r++){const row=rows[r];const pc=String(row[0]||'').trim().toLowerCase();const pi=pA[pc];if(pi===undefined)continue;for(const[di,col]of Object.entries(dcm)){const v=String(row[col]||'').trim();if(v&&v!=='undefined')res[`${di}_P${pi+1}`]=v}}
      if(!Object.keys(res).length)setTTMsg('⚠️ Could not read. Check format.');
      else{ver===2?setTT2(res):setTT1(res);setTTMsg(`✅ Imported ${Object.keys(res).length} classes into Week ${ver}`)}
    }catch(err){setTTMsg('❌ '+err.message)}};

              {past.length>0&&<><div style={{fontSize:10,fontWeight:700,color:C.mut,textTransform:'uppercase',letterSpacing:'0.07em',margin:'10px 0 5px'}}>Past</div>
                {past.map(d=><div key={d.id} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 10px',borderRadius:8,marginBottom:4,opacity:0.4,background:C.sur2,border:`1px solid ${C.bor}`}}>
                  <div style={{flex:1,fontSize:11}}>{d.label}<span style={{color:C.mut}}> — {d.category}</span></div>
                  <span style={{fontSize:11,color:C.mut}}>{new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>
                  <button style={btnX} onClick={()=>delDate(d.id)}>✕</button>
                </div>)}
              </>}
            </>;
          })()}
        </div>
      </div>}

      {/* REFLECT */}
      {isVis('reflect')&&<div style={{...card,marginBottom:12}}>
        <SHead title="💬 End-of-Week Reflection" id="reflect" actions={null}/>
        <div style={{padding:14}}>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14}}>
            <span style={{fontSize:12,color:C.mut}}>How was this week?</span>
            {[1,2,3,4,5].map(n=><button key={n} onClick={()=>updRefl('rating',n)} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,opacity:wkRefl.rating>=n?1:0.2,padding:'1px 2px'}}>⭐</button>)}
            {wkRefl.rating>0&&<span style={{fontSize:12,color:C.mut}}>({wkRefl.rating}/5)</span>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><span style={lbl}>✅ What went well?</span><textarea style={{...inp,resize:'vertical',minHeight:90,lineHeight:1.7}} placeholder="Lessons that landed, pastoral wins…" value={wkRefl.wentWell} onChange={e=>updRefl('wentWell',e.target.value)}/></div>
            <div><span style={lbl}>🔁 What needs following up?</span><textarea style={{...inp,resize:'vertical',minHeight:90,lineHeight:1.7}} placeholder="Students to check on, tasks to carry over…" value={wkRefl.followUp} onChange={e=>updRefl('followUp',e.target.value)}/></div>
          </div>
        </div>
      </div>}

    </div>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [dark]=useState(()=>load('tp_dark',false));
  const [unlocked,setUnlocked]=useState(false);
  const [showGist,setShowGist]=useState(false);
  function handleUnlock(){const hasTok=!!load('mzr_gist_token','');const skip=load('mzr_gist_skipped',false);if(!hasTok&&!skip)setShowGist(true);else setUnlocked(true)}
  if(!unlocked&&!showGist)return<PasswordScreen dark={dark} onUnlock={handleUnlock}/>;
  if(showGist)return<GistSetup dark={dark} onDone={(t,id)=>{save('mzr_gist_token',t);save('mzr_gist_id',id);setShowGist(false);setUnlocked(true)}} onSkip={()=>{save('mzr_gist_skipped',true);setShowGist(false);setUnlocked(true)}}/>;
  return<Planner/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
